<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mood Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container py-4">
      <!-- Tooltip -->
      <div id="tileTooltip" class="tooltip"></div>
      
      <header class="mb-4 text-center">
        <h1 class="fw-bold">Муд‑трекер</h1>
        <p class="text-muted mb-0">Отмечай настроение каждый день</p>
      </header>

      <section class="mb-4">
        <div class="mood-buttons-container">
          <button class="btn mood-btn" data-mood="1" style="--mood:#e3f2fd">😌 Очень спокойно</button>
          <button class="btn mood-btn" data-mood="2" style="--mood:#c8e6c9">🙂 Нормально</button>
          <button class="btn mood-btn" data-mood="3" style="--mood:#fff9c4">😐 Так себе</button>
          <button class="btn mood-btn" data-mood="4" style="--mood:#ffe0b2">☹️ Плохо</button>
          <button class="btn mood-btn" data-mood="5" style="--mood:#ffcdd2">😣 Очень плохо</button>
        </div>
      </section>

      <section>
        <div class="year-controls-container">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <div class="h5 mb-0" id="yearLabel"></div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="prevYear">← Год</button>
              <button class="btn btn-outline-secondary btn-sm" id="todayBtn">Сегодня</button>
              <button class="btn btn-outline-secondary btn-sm" id="nextYear">Год →</button>
            </div>
          </div>
        </div>
        <div id="grid" class="mood-grid"></div>
        <div class="year-controls-container">
          <div class="small text-muted mt-2 text-center">Нажми на плитку дня, затем выбери настроение выше.</div>
        </div>
      </section>
    </div>

    <!-- Error Modal -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-danger">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="errorModalLabel">⚠️ Ошибка</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">Нельзя ставить настроение на будущие даты. Выберите сегодняшний день или дату из прошлого.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Понятно</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script.js"></script>
  </body>
  </html>
